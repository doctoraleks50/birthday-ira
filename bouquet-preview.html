<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peony bouquet preview</title>
  <style>
    html, body { margin: 0; height: 100%; background: #2a1228; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from "three";
import { createBouquet } from "./js/peony.js";

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x2a1228, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x2a1228, 0.03);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0.35, 1.15, 5.6);
camera.lookAt(0, 0.55, 0);

scene.add(new THREE.AmbientLight(0xffe8f0, 0.55));
const key = new THREE.DirectionalLight(0xfff5f8, 1.7);
key.position.set(4, 8, 6);
key.castShadow = true;
scene.add(key);
const fill = new THREE.DirectionalLight(0xa8c4ff, 0.55);
fill.position.set(-5, 2, 3);
scene.add(fill);
const rim = new THREE.PointLight(0xff6b9d, 1.3, 30);
rim.position.set(0, 2, -3);
scene.add(rim);

const bouquet = createBouquet();
bouquet.position.set(0, -0.25, 0);
bouquet.rotation.y = 0.28;
scene.add(bouquet);

window.__ready = true;
window.__bouquet = bouquet;

function tick(t) {
  requestAnimationFrame(tick);
  const wrap = bouquet.userData.wrap;
  wrap.rotation.y = 0.28 + Math.sin(t * 0.00035) * 0.08;
  wrap.rotation.x = -0.08 + Math.sin(t * 0.00028) * 0.03;
  renderer.render(scene, camera);
}
tick(0);
</script>
</body>
</html>
