<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0618" />
  <meta name="description" content="З Днем Народження, кохана" />
  <title>Для коханої</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="scene3d" aria-hidden="true"></canvas>

  <!-- 1. Intro -->
  <section id="intro" class="overlay scene">
    <div class="panel">
      <div class="pulse-heart" aria-hidden="true"></div>
      <p class="whisper">Для тебе…</p>
      <button id="open-btn" class="btn-primary" type="button">Відкрити</button>
    </div>
  </section>

  <!-- 2. Greeting -->
  <section id="greeting" class="overlay scene hidden">
    <div class="panel greeting-panel">
      <h1 id="greeting-title" class="greeting-title"></h1>
      <p id="greeting-body" class="greeting-body"></p>
      <p id="from-name" class="from-name"></p>
      <button id="next-btn" class="btn-primary" type="button">Далі</button>
    </div>
  </section>

  <!-- 3. Bouquet UI -->
  <section id="bouquet-ui" class="ui-layer scene hidden">
    <p class="scene-caption">Букет піонів для тебе</p>
    <button id="take-btn" class="btn-primary take-btn hidden" type="button">Взяти</button>
  </section>

  <!-- 4. Wish / stars UI -->
  <section id="wish-ui" class="ui-layer scene hidden">
    <p id="wish-text" class="wish-text"></p>
  </section>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
